<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopee Affiliate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            shopee: { 400: '#fb923c', 500: '#f97316', 600: '#ea580c' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen font-sans antialiased">

  <div class="max-w-2xl mx-auto px-4 py-10">

    <!-- Header -->
    <header class="text-center mb-10">
      <h1 class="text-lg font-bold">Shopee <span class="text-shopee-400">Affiliate</span></h1>
      <p class="text-xs text-slate-500 mt-1">Dán link Shopee, nhận link tiếp thị</p>
    </header>

    <!-- Converter -->
    <div class="card rounded-2xl p-5 mb-4">
      <div class="flex gap-3">
        <input
          type="url"
          id="urlInput"
          placeholder="Dán link Shopee vào đây..."
          class="flex-1 input-field rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none"
        />
        <button
          id="convertBtn"
          onclick="convertLink()"
          class="btn-orange px-5 py-3 rounded-xl text-sm font-semibold whitespace-nowrap"
        >
          Chuyển Đổi
        </button>
      </div>

      <!-- Status -->
      <div id="statusSection" class="mt-4 hidden">
        <div class="flex items-center gap-2">
          <div id="statusIcon" class="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
          <span id="statusText" class="text-xs text-slate-400">Đang chờ...</span>
        </div>
        <div class="w-full bg-white/5 rounded-full h-1 mt-2 overflow-hidden">
          <div id="progressBar" class="h-full rounded-full transition-all duration-500 bg-shopee-500" style="width: 0%"></div>
        </div>
      </div>

      <!-- Result -->
      <div id="resultSection" class="hidden mt-4">
        <div class="inner-card rounded-xl p-4">
          <p id="shortUrl" class="text-sm text-shopee-400 font-semibold break-all mb-3"></p>
          <div class="flex gap-2">
            <button onclick="openLink()" class="btn-green px-4 py-2 rounded-lg text-xs font-medium flex-1">
              <span id="openBtnText">Mở link</span>
            </button>
            <button onclick="copyToClipboard()" class="btn-ghost px-4 py-2 rounded-lg text-xs font-medium flex-1">
              Copy
            </button>
          </div>
        </div>
        <div id="toast" class="hidden mt-2 text-center">
          <span class="text-emerald-400 text-xs">Đã copy</span>
        </div>
      </div>

      <!-- Error -->
      <div id="errorSection" class="hidden mt-4">
        <p id="errorText" class="text-xs text-red-400 bg-red-500/10 rounded-lg px-3 py-2"></p>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="card rounded-xl p-4 text-center">
        <p class="text-[10px] text-slate-500 mb-1">Đơn hàng</p>
        <p class="text-lg font-bold text-shopee-400" id="statTotalOrders">0</p>
      </div>
      <div class="card rounded-xl p-4 text-center">
        <p class="text-[10px] text-slate-500 mb-1">Hoa hồng</p>
        <p class="text-lg font-bold text-emerald-400" id="statTotalCommission">0₫</p>
      </div>
      <div class="card rounded-xl p-4 text-center">
        <p class="text-[10px] text-slate-500 mb-1">Doanh thu</p>
        <p class="text-lg font-bold text-violet-400" id="statTotalRevenue">0₫</p>
      </div>
    </div>

    <!-- Orders -->
    <div class="card rounded-2xl p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold">Đơn hàng</h2>
        <button
          id="loadReportBtn"
          onclick="loadReport()"
          class="btn-violet px-4 py-2 rounded-lg text-xs font-medium"
        >
          Tải báo cáo
        </button>
      </div>

      <div id="reportError" class="hidden mb-3">
        <p id="reportErrorText" class="text-xs text-red-400 bg-red-500/10 rounded-lg px-3 py-2"></p>
      </div>

      <!-- Empty -->
      <div id="reportEmpty" class="text-center py-8">
        <p class="text-slate-600 text-xs">Nhấn "Tải báo cáo" để xem dữ liệu</p>
      </div>

      <!-- Loading -->
      <div id="reportLoading" class="hidden text-center py-8">
        <div class="spinner"><div></div><div></div><div></div><div></div></div>
      </div>

      <!-- Table -->
      <div id="reportTableContainer" class="hidden overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-t border-white/5">
              <th class="px-3 py-2 text-left text-slate-500 font-medium">Mã đơn</th>
              <th class="px-3 py-2 text-left text-slate-500 font-medium">Thời gian</th>
              <th class="px-3 py-2 text-left text-slate-500 font-medium">Giá trị</th>
              <th class="px-3 py-2 text-left text-slate-500 font-medium">Hoa hồng</th>
              <th class="px-3 py-2 text-left text-slate-500 font-medium">Sản phẩm</th>
              <th class="px-3 py-2 text-left text-slate-500 font-medium">Trạng thái</th>
            </tr>
          </thead>
          <tbody id="reportTableBody" class="divide-y divide-white/[0.03]"></tbody>
        </table>
      </div>

      <!-- No Data -->
      <div id="reportNoData" class="hidden text-center py-8">
        <p class="text-slate-500 text-xs">Không có đơn hàng</p>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
